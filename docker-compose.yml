services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pdt
      POSTGRES_PASSWORD: pdt
      POSTGRES_DB: pdt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdt -d pdt"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - path: ./.env
        required: false
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg://pdt:pdt@db:5432/pdt
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
      COMPLIANCE_DOCS_PATH: /compliance
      PROJECT_ROOT: /workspace
    ports:
      - "8000:8000"
    init: true
    volumes:
      - ./backend:/app
      - ./compliance:/compliance:ro
      - ./.env.example:/workspace/.env.example:ro
      - ./.gitignore:/workspace/.gitignore:ro
      - ./compliance:/workspace/compliance:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    init: true
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  frontend_node_modules:
